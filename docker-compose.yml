# fastInfo 本机 Docker 运行环境
#
# 启动核心服务(默认):
#   docker compose up -d --build
#
# 配置说明:
#   - 共享配置(.env): API Key / SECRET / SMTP 等放项目根 .env
#     复制 .env.example 为 .env 后填入
#   - Docker 差异(env.docker.local): 容器内服务地址 / 端口
#     复制 docker/env.docker.local.example 为 docker/env.docker.local
#
# 访问(正式/预发环境,主机端口):
#   Web:    http://127.0.0.1:18080   (Nginx 主入口,推荐)
#   API:    http://127.0.0.1:18000   (直连 FastAPI,调试用)
#   Docs:   http://127.0.0.1:18080/docs/
#
# 本地开发端口对照见 docs/ports-分配方案.md
# 同机 dev 环境(fast_info_dev)请用独立目录 + 28080/28000 端口,勿改本文件。
#
# ⚠️ 生产 2C4G 约束:
#   - 生产机只跑本 compose(prod),不要同机常驻 fast_info_dev
#   - 各服务 mem_limit 已按 2C4G 预留系统+Caddy 余量(~1.5G)
#   - web→api 依赖 Docker DNS 动态解析(见 docker/nginx/default.conf)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  mongo:
    image: ${DOCKER_REGISTRY_PREFIX:-}mongo:8
    # 2C4G: 限制 WiredTiger 缓存,避免 mongo 默认吃掉大半内存
    command:
      - mongod
      - --bind_ip_all
      - --wiredTigerCacheSizeGB
      - "0.5"
    ports:
      - "${FASTINFO_MONGO_PORT:-27018}:27017"  # S-Mongo 默认 27018; dev 同机可设 27019
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    mem_limit: 768m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: ${DOCKER_REGISTRY_PREFIX:-}redis:7-alpine
    ports:
      - "${FASTINFO_REDIS_PORT:-6380}:6379"    # S-Redis 默认 6380; dev 同机可设 6381
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "128mb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --save
      - "60"
      - "1000"
    restart: unless-stopped
    mem_limit: 192m
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5

  # ============================================================
  # 🔴 env_file 选择逻辑(环境身份关键点)
  # ============================================================
  # 默认用 docker/env.docker.local(本机预发,APP_ENV=docker)
  # 生产 ECS 部署用 docker/env.prod.local(APP_ENV=prod,MONGO_DB=fastinfo_prod)
  # 切换方式(任选一种):
  #   A. 在部署前 export FASTINFO_ENV_FILE=docker/env.prod.local,然后 docker compose up
  #   B. 部署脚本 deploy-prod.sh 已自动设这个变量
  #   C. cp docker/env.prod.local docker/env.docker.local 临时替换(部署完改回来,不推荐)
  # ============================================================
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - ${FASTINFO_ENV_FILE:-docker/env.docker.local}
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro              # 共享 .env(API Key / SECRET 等)
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${FASTINFO_API_PORT:-18000}:8000"     # S-API 默认 18000; dev 同机可设 28000
    healthcheck:
      # 等 FastAPI /healthz 真正返 200,web 才能起来(防 DNS 解析竞态)
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    # 运行时挂载 nginx conf,避免 recreate 回退到镜像内旧 conf(动态 DNS 丢失)
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy        # 必须等 api 健康后才起 nginx
    ports:
      - "${FASTINFO_WEB_PORT:-18080}:80"      # S-Web 默认 18080; dev 同机可设 28080
    restart: unless-stopped
    mem_limit: 128m
    logging: *default-logging
    # 经本容器 Nginx 反代打 /healthz;api IP 变更后动态 resolver 应仍 200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # 后台 worker(默认随 api/web 一起拉起)
  # ============================================================
  ingest_daemon:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - ${FASTINFO_ENV_FILE:-docker/env.docker.local}
    command: ["python", "scripts/ingest_daemon.py", "--interval", "1800", "--limit", "8"]
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 禁用 Dockerfile 中的 HTTP healthcheck(ingest_daemon 不监听端口)
    healthcheck:
      disable: true
    restart: unless-stopped
    mem_limit: 384m
    logging: *default-logging

  subs_scheduler:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - ${FASTINFO_ENV_FILE:-docker/env.docker.local}
    command: ["python", "scripts/subs_scheduler.py", "--interval", "60"]
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 禁用 Dockerfile 中的 HTTP healthcheck(subs_scheduler 不监听端口)
    healthcheck:
      disable: true
    restart: unless-stopped
    mem_limit: 256m
    logging: *default-logging

volumes:
  mongo_data:
  redis_data:
  api_data:
