# fastInfo 本机 Docker 运行环境
#
# 启动核心服务(默认):
#   docker compose up -d --build
#
# 配置说明:
#   - 共享配置(.env): API Key / SECRET / SMTP 等放项目根 .env
#     复制 .env.example 为 .env 后填入
#   - Docker 差异(env.docker.local): 容器内服务地址 / 端口
#     复制 docker/env.docker.local.example 为 docker/env.docker.local
#
# 访问(预发环境,主机端口):
#   Web:    http://127.0.0.1:18080   (Nginx 主入口,推荐)
#   API:    http://127.0.0.1:18000   (直连 FastAPI,调试用)
#   Docs:   http://127.0.0.1:18080/docs/
#
# 本地开发端口对照见 docs/ports-分配方案.md

services:
  mongo:
    image: ${DOCKER_REGISTRY_PREFIX:-}mongo:8
    ports:
      - "27018:27017"                          # S-Mongo: 主机 27018 → 容器 27017(本地 27017)
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${DOCKER_REGISTRY_PREFIX:-}redis:7-alpine
    ports:
      - "6380:6379"                           # S-Redis: 主机 6380 → 容器 6379(本地 6379)
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --save
      - "60"
      - "1000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - docker/env.docker.local          # Docker 差异值(覆盖 .env 里的同名 key)
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro              # 共享 .env(API Key / SECRET 等)
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18000:8000"                          # S-API: 主机 18000 → 容器 8000(本地 8000)
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    depends_on:
      api:
        condition: service_started
    ports:
      - "18080:80"                           # S-Web: 主机 18080 → 容器 80(本地无)
    restart: unless-stopped

  # ============================================================
  # 后台 worker(默认随 api/web 一起拉起)
  # ============================================================
  ingest_daemon:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - docker/env.docker.local
    command: ["python", "scripts/ingest_daemon.py", "--interval", "1800", "--limit", "8"]
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  subs_scheduler:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - docker/env.docker.local
    command: ["python", "scripts/subs_scheduler.py", "--interval", "60"]
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  api_data: