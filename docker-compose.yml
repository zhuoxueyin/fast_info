# fastInfo 本机 Docker 运行环境
#
# 启动核心服务(默认):
#   docker compose up -d --build
#
# 配置说明:
#   - 共享配置(.env): API Key / SECRET / SMTP 等放项目根 .env
#     复制 .env.example 为 .env 后填入
#   - Docker 差异(env.docker.local): 容器内服务地址 / 端口
#     复制 docker/env.docker.local.example 为 docker/env.docker.local
#
# 访问(本机测试环境 fast_info_dev,主机端口):
#   Web:    http://127.0.0.1:28080   (Nginx 主入口,推荐)
#   API:    http://127.0.0.1:28000   (直连 FastAPI,调试用)
#   Docs:   http://127.0.0.1:28080/docs/
#
# 本地开发端口对照见 docs/ports-分配方案.md

services:
  mongo:
    image: ${DOCKER_REGISTRY_PREFIX:-}mongo:8
    ports:
      - "37018:27017"                          # Dev-Mongo: 主机 37018 → 容器 27017(避开正式 27018)
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${DOCKER_REGISTRY_PREFIX:-}redis:7-alpine
    ports:
      - "7380:6379"                           # Dev-Redis: 主机 7380 → 容器 6379(避开正式 6380)
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --save
      - "60"
      - "1000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # 🔴 env_file 选择逻辑(环境身份关键点)
  # ============================================================
  # 默认用 docker/env.docker.local(本机预发,APP_ENV=docker)
  # 生产 ECS 部署用 docker/env.prod.local(APP_ENV=prod,MONGO_DB=fastinfo_prod)
  # 切换方式(任选一种):
  #   A. 在部署前 export FASTINFO_ENV_FILE=docker/env.prod.local,然后 docker compose up
  #   B. 部署脚本 deploy-prod.sh 已自动设这个变量
  #   C. cp docker/env.prod.local docker/env.docker.local 临时替换(部署完改回来,不推荐)
  # ============================================================
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - ${FASTINFO_ENV_FILE:-docker/env.docker.local}
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro              # 共享 .env(API Key / SECRET 等)
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "28000:8000"                          # Dev-API: 主机 28000 → 容器 8000(避开正式 18000)
    healthcheck:
      # 等 FastAPI /healthz 真正返 200,web 才能起来(防 DNS 解析竞态)
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    depends_on:
      api:
        condition: service_healthy        # 必须等 api 健康后才起 nginx,否则 upstream "api" 解析失败导致容器崩溃重启
    ports:
      - "28080:80"                           # Dev-Web: 主机 28080 → 容器 80(避开正式 18080)
    restart: unless-stopped
    # 运行时内存限制（构建时不生效）。低内存机器建议用 scripts/build-low-memory.sh 构建。
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # 后台 worker(默认随 api/web 一起拉起)
  # ============================================================
  ingest_daemon:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - ${FASTINFO_ENV_FILE:-docker/env.docker.local}
    command: ["python", "scripts/ingest_daemon.py", "--interval", "1800", "--limit", "8"]
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 禁用 Dockerfile 中的 HTTP healthcheck(ingest_daemon 不监听端口)
    healthcheck:
      disable: true
    restart: unless-stopped

  subs_scheduler:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-}
    env_file:
      - ${FASTINFO_ENV_FILE:-docker/env.docker.local}
    command: ["python", "scripts/subs_scheduler.py", "--interval", "60"]
    volumes:
      - api_data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 禁用 Dockerfile 中的 HTTP healthcheck(subs_scheduler 不监听端口)
    healthcheck:
      disable: true
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  api_data: