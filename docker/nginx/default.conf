# Docker 内置 DNS(127.0.0.11),让 nginx 在 api 容器重启后能跟随新 IP
resolver 127.0.0.11 valid=10s ipv6=off;

# upstream 改为变量方式,配合 resolver,nginx 不再静态解析启动时的 IP
upstream fastinfo_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # 所有反代用变量形式,触发运行时 DNS 解析(resolver 已配)
    set $api_upstream http://fastinfo_api;

    location = /healthz {
        proxy_pass $api_upstream/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $api_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/ {
        alias /usr/share/nginx/docs/;
        try_files $uri $uri/ /docs/index.html;
    }

    location = /docs {
        return 301 /docs/;
    }

    location = /swagger {
        proxy_pass $api_upstream/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /redoc {
        proxy_pass $api_upstream/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass $api_upstream/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
