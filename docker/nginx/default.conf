# fastInfo web 入口
# 关键:proxy_pass 必须用变量 + Docker 内置 DNS,避免 api 容器 recreate 后
# Nginx 仍缓存旧 IP 导致全站 502(经典 Docker+Nginx 坑)。
server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Docker embedded DNS; valid=10s 让上游 IP 变更最多 10s 内生效
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # 压缩 JS/CSS,降低弱网下大 chunk(如 echarts)加载失败概率
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_vary on;

    # 变量形式上游:强制每次(或 valid TTL 后)重新解析 service name
    set $api_upstream http://api:8000;

    location = /healthz {
        proxy_pass $api_upstream/healthz;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/ {
        alias /usr/share/nginx/docs/;
        try_files $uri $uri/ /docs/index.html;
    }

    location = /docs {
        return 301 /docs/;
    }

    location = /swagger {
        proxy_pass $api_upstream/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /redoc {
        proxy_pass $api_upstream/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        proxy_pass $api_upstream/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 带 hash 的静态资源可长缓存;关掉 range 避免部分代理对大文件 206 截断
    location /assets/ {
        root /usr/share/nginx/html;
        max_ranges 0;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
