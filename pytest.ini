[pytest]
# fastInfo 测试配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --color=yes
    --durations=10
    -p no:warnings

# 自定义标记
markers =
    smoke: Smoke tests - core fast path verification
    slow: Slow tests - includes LLM calls
    auth: Authentication related
    subs: Subscription related
    settings: Push settings related
    home: Homepage entry points
    inbox: Inbox related
    admin: Admin related

# 异步支持
asyncio_mode = auto
